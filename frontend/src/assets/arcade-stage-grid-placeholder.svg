<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Arcade stage grid placeholder">
  <defs>
    <pattern id="pixel-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#050308"/>
      <path d="M32 0H0V1H32ZM0 32V31H32V32Z" fill="#1a2a3a" opacity="0.55"/>
      <path d="M0 0H1V32H0ZM31 0H32V32H31Z" fill="#243648" opacity="0.35"/>
