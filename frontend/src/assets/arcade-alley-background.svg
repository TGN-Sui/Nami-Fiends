<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Cyber alley arcade placeholder">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="45%" stop-color="#0b0614"/>
      <stop offset="100%" stop-color="#040208"/>
    </linearGradient>
    <linearGradient id="wet-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120a1e" stop-opacity="0"/>
      <stop offset="55%" stop-color="#0a0612" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#030106"/>
    </linearGradient>
    <radialGradient id="pink-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2d95" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#ff2d95" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyan-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amber-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb347" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- distant cyber skyline -->
  <g opacity="0.55">
    <rect x="120" y="360" width="90" height="220" fill="#120c22"/>
    <rect x="240" y="300" width="70" height="280" fill="#0f0a1c"/>
    <rect x="420" y="330" width="110" height="250" fill="#16102a"/>
    <rect x="610" y="280" width="80" height="300" fill="#100a1e"/>
    <rect x="1280" y="310" width="95" height="270" fill="#130d24"/>
    <rect x="1420" y="260" width="120" height="320" fill="#0d0818"/>
    <rect x="1580" y="340" width="85" height="240" fill="#15102a"/>
    <rect x="1710" y="290" width="100" height="290" fill="#100b1f"/>
    <rect x="300" y="390" width="40" height="12" fill="#75d7ff" opacity="0.35"/>
    <rect x="450" y="360" width="28" height="10" fill="#ff2d95" opacity="0.42"/>
    <rect x="1320" y="370" width="34" height="11" fill="#43f5a7" opacity="0.38"/>
    <rect x="1460" y="330" width="48" height="12" fill="#00e5ff" opacity="0.4"/>
  </g>

  <!-- alley walls -->
  <path d="M0 520 L420 470 L420 1080 L0 1080 Z" fill="#07040d" opacity="0.92"/>
  <path d="M1920 500 L1480 455 L1480 1080 L1920 1080 Z" fill="#07040d" opacity="0.92"/>

  <!-- ground reflections -->
  <rect y="700" width="1920" height="380" fill="url(#wet-ground)"/>

  <!-- ambient glow pools -->
  <ellipse cx="360" cy="860" rx="220" ry="120" fill="url(#pink-glow)" filter="url(#soft-blur)"/>
  <ellipse cx="760" cy="900" rx="180" ry="100" fill="url(#cyan-glow)" filter="url(#soft-blur)"/>
  <ellipse cx="1120" cy="880" rx="200" ry="110" fill="url(#amber-glow)" filter="url(#soft-blur)"/>
  <ellipse cx="1520" cy="870" rx="210" ry="115" fill="url(#pink-glow)" filter="url(#soft-blur)"/>

  <!-- arcade cabinets -->
  <g>
    <rect x="250" y="500" width="150" height="360" rx="16" fill="#181222" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="268" y="520" width="114" height="130" rx="10" fill="#050308" stroke="#ff2d95" stroke-opacity="0.45"/>
    <rect x="285" y="700" width="80" height="18" rx="4" fill="#ff2d95" opacity="0.55"/>

    <rect x="520" y="470" width="165" height="390" rx="16" fill="#171320" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="540" y="492" width="125" height="145" rx="10" fill="#050308" stroke="#00e5ff" stroke-opacity="0.48"/>
    <rect x="560" y="690" width="85" height="18" rx="4" fill="#00e5ff" opacity="0.55"/>

    <rect x="810" y="520" width="140" height="340" rx="16" fill="#16101f" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="826" y="538" width="108" height="120" rx="10" fill="#050308" stroke="#9b5de5" stroke-opacity="0.45"/>
    <rect x="842" y="700" width="76" height="18" rx="4" fill="#9b5de5" opacity="0.5"/>

    <rect x="1080" y="485" width="158" height="375" rx="16" fill="#181222" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="1098" y="505" width="122" height="138" rx="10" fill="#050308" stroke="#ffb347" stroke-opacity="0.48"/>
    <rect x="1116" y="690" width="86" height="18" rx="4" fill="#ffb347" opacity="0.55"/>

    <rect x="1340" y="510" width="148" height="350" rx="16" fill="#171320" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="1358" y="528" width="112" height="128" rx="10" fill="#050308" stroke="#43f5a7" stroke-opacity="0.45"/>
    <rect x="1374" y="700" width="80" height="18" rx="4" fill="#43f5a7" opacity="0.52"/>
  </g>

  <!-- hanging wires / alley clutter -->
  <path d="M0 180 C280 260 420 120 700 210" stroke="#2a2038" stroke-width="3" fill="none" opacity="0.55"/>
  <path d="M1220 150 C1480 240 1660 110 1920 200" stroke="#2a2038" stroke-width="3" fill="none" opacity="0.55"/>

  <!-- placeholder label -->
  <g opacity="0.72">
    <rect x="760" y="44" width="400" height="54" rx="0" fill="#050308" stroke="#8dffb2" stroke-opacity="0.28"/>
    <text x="960" y="78" text-anchor="middle" fill="#8dffb2" font-family="monospace" font-size="24" letter-spacing="4">ARCADE BACKGROUND PLACEHOLDER</text>
  </g>

  <text x="960" y="1040" text-anchor="middle" fill="#9fdcff" fill-opacity="0.42" font-family="monospace" font-size="18" letter-spacing="3">1920 × 1080 · REPLACE IN OWNER EDIT MODE</text>
</svg>